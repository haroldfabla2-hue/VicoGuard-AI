<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VicoGuard AI - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-secondary-fixed": "#23005c",
                        "on-tertiary": "#472a00",
                        "secondary-container": "#571bc1",
                        "tertiary-fixed": "#ffddb8",

                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",

<style>
        body {
            background-color: #080A0F;
            color: #e2e2e9;
        }
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(22, 28, 40, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        /* Custom Input Styling */
        .cyber-input {
            background-color: #080A0F;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e2e2e9;
            transition: all 0.2s ease;
        }
        .cyber-input:focus {
            outline: none;
            border-color: #4edea3;
            box-shadow: 0 0 8px rgba(78, 222, 163, 0.2);
            background-color: rgba(22, 28, 40, 0.9);
        }
        .icon-glow {
            filter: drop-shadow(0 0 8px rgba(78, 222, 163, 0.4));
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Screen - TopNavBar and SideNavBar are suppressed -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Subtle background ambient light -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% 30%, rgba(16, 185, 129, 0.15) 0%, transparent 60%);"></div>
<div class="glass-panel w-full max-w-md rounded-xl p-xl relative z-10 shadow-[0_4px_24px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center text-center mb-lg">
<div class="w-16 h-16 rounded-full bg-[rgba(16,185,129,0.1)] border border-[rgba(16,185,129,0.2)] flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-primary text-3xl icon-glow" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Reset your password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email address and we'll send you a link to reset your password.</p>
</div>
<form class="space-y-md" onsubmit="event.preventDefault();">
<div>
<label class="block font-label-mono text-label-mono text-on-surface-variant mb-xs" for="email">Email Address</label>
<input class="cyber-input w-full rounded-lg px-md py-sm font-body-md text-body-md placeholder:text-surface-variant" id="email" placeholder="operator@vicoguard.ai" required="" type="email"/>
</div>
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-headline-sm text-headline-sm py-sm px-md rounded-lg transition-all duration-200 active:scale-[0.98] mt-lg flex items-center justify-center gap-2" type="submit">
                    Send Reset Link
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-lg text-center">
<a class="inline-flex items-center gap-2 font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                    Back to login
                </a>
</div>
</div>
</main>
<!-- Transactional Screen - Footer is suppressed for hyper-focus -->
</body></html>

# ═══════════════════════════════════════════════════════════
# VicoGuard AI — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════
# Runs on every push/PR to main:
#   1. Lint (ruff)
#   2. Type check (mypy, soft)
#   3. Tests (pytest)
#   4. Docker build (no push)
#   5. Security scan (gitleaks on own repo)
# ═══════════════════════════════════════════════════════════

name: 🔒 VicoGuard CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: 📏 Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check wasp-centinela/ src/ --output-format=github || true

  test:
    name: 🧪 Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          sudo chmod +x /usr/local/bin/gitleaks
      - name: Install dependencies
        run: |
          pip install -r wasp-centinela/requirements.txt
          pip install -r src/requirements.txt
      - name: Run Centinela tests
        working-directory: wasp-centinela
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Hub image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: hub
          push: false
          tags: vicoguard-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: 🔐 Self-Scan (gitleaks)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
